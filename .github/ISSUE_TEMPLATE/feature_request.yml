name: ✨ Feature request
description: Suggest a new feature or an enhancement to an existing one.
title: "[Feature] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Even if it doesn't ship right away, every request goes into the backlog and helps shape what we build next.

  - type: textarea
    id: what
    attributes:
      label: What would you like the bot to do?
      placeholder: e.g. Send a DM to the assigned train conductor 30 minutes before the train fires.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why does this matter for your alliance?
      description: What problem does it solve, or what would it make easier?
      placeholder: e.g. Conductors keep missing the train because they don't see the channel ping in time.
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: How are you handling it today (if at all)?
      placeholder: e.g. We DM them manually each day. Sometimes we forget.
    validations:
      required: false
