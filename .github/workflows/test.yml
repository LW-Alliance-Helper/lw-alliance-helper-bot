name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit & Integration Tests ────────────────────────────────────────────────
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock pytest-timeout

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short -m "not sheets"

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short -m "not sheets" --timeout=30

      # Re-run the suite as if every guild were Premium. Catches premium-only
      # code paths that the default (free-tier) suite doesn't exercise — e.g.
      # the multi-template manager, the FORCE_PREMIUM short-circuit, the
      # `<@id>` mention-or-name path, and the new survey question types.
      - name: Run suite with FORCE_PREMIUM=1
        env:
          FORCE_PREMIUM: "1"
        run: |
          pytest tests/unit/ tests/integration/ --tb=short -m "not sheets" --timeout=30

  # ── Sheet Integration Tests (main branch only) ──────────────────────────────
  sheet-tests:
    name: Sheet Integration Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: unit-and-integration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock pytest-timeout pytest-rerunfailures

      - name: Run sheet integration tests
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TEST_SHEET_ID: ${{ secrets.TEST_SHEET_ID }}
        run: |
          # pytest-rerunfailures retries each sheet test up to 2× with a
          # 65-second pause. The per-user Google Sheets write quota is
          # 60/minute and our save_* helpers each make ~5-7 API calls, so
          # a serial run of ~18 live-write tests routinely trips the limit.
          # Sleeping past the rolling-window edge resets the quota.
          #
          # We deliberately do NOT pin --only-rerun to "Quota exceeded" /
          # "APIError" — the storm save_* helpers catch their own 429s
          # internally and surface as plain AssertionErrors against
          # empty-sheet reads, which never matched those filters. Rerunning
          # any failure twice still catches real regressions (they'd fail
          # 3× in a row); transient quota issues self-heal.
          pytest tests/sheets/ -v --tb=short -m "sheets" \
            --reruns 2 --reruns-delay 65

  # ── Deploy gate ─────────────────────────────────────────────────────────────
  # Railway watches the main branch and deploys automatically.
  # By requiring both test jobs to pass before this job,
  # we prevent Railway from seeing a successful "deploy" signal
  # if tests fail. If you want Railway to only deploy after CI,
  # enable "Wait for CI checks" in Railway's GitHub integration settings.
  deploy-ready:
    name: All Tests Passed
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [unit-and-integration, sheet-tests]

    steps:
      - name: Signal deployment readiness
        run: |
          echo "✅ All tests passed. Railway deployment can proceed."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
