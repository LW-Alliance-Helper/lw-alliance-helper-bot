[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    sheets: marks tests that require real Google Sheets access (deselect with -m "not sheets")
    slow: marks tests that take longer to run
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
log_cli = true
log_cli_level = WARNING
